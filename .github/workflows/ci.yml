name: CI
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: 
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
jobs:
  Run-tests:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello, world!"
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test  